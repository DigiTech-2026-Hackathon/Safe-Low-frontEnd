<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altroboard</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg-color: #0e0d0a; --hover-bg: #211f1b; --text-gray: #9c9a95; --text-white: #ffffff; --accent-red: #f15a42; --collapsed-width: 80px; --expanded-width: 260px; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: #1a1a1a; display: flex; height: 100vh; }
        .sidebar { width: var(--collapsed-width); background-color: var(--bg-color); height: 100%; display: flex; flex-direction: column; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; white-space: nowrap; border-right: 1px solid #1f1d1a; }
        .sidebar:hover { width: var(--expanded-width); }
        .sidebar-header { height: 80px; display: flex; align-items: center; padding: 0; justify-content: flex-start; }
        .menu-wrapper { width: var(--collapsed-width); display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        .logo-text { color: var(--accent-red); font-size: 26px; font-weight: 700; opacity: 0; transition: opacity 0.2s; letter-spacing: -1px; }
        .sidebar:hover .logo-text { opacity: 1; }
        .nav-list { list-style: none; padding: 0 12px; flex: 1; }
        .nav-item { display: flex; align-items: center; height: 56px; border-radius: 12px; cursor: pointer; color: var(--text-gray); transition: all 0.2s ease; margin-bottom: 8px; text-decoration: none; }
        .icon-box { width: calc(var(--collapsed-width) - 24px); height: 100%; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        .nav-item i { width: 24px; height: 24px; }
        .nav-text { font-size: 17px; font-weight: 500; margin-left: 8px; opacity: 0; transition: opacity 0.2s; }
        .sidebar:hover .nav-text { opacity: 1; }
        .nav-item:hover, .nav-item.active { background-color: var(--hover-bg); color: var(--text-white); }
        .sidebar-footer { padding: 20px 12px 40px 12px; }
        .login-btn { display: flex; align-items: center; height: 56px; color: var(--accent-red); text-decoration: none; border-radius: 12px; }
        .login-btn .nav-text { color: var(--accent-red); font-weight: 600; }
        .content { flex: 1; display: flex; justify-content: center; align-items: center; color: #444; font-size: 1.2rem; }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header"><div class="menu-wrapper"><i data-lucide="menu" style="color:white; cursor:pointer;"></i></div><span class="logo-text">altroboard</span></div>
        <ul class="nav-list">
            <li class="nav-item"><div class="icon-box"><i data-lucide="home"></i></div><span class="nav-text">홈</span></li>
            <li class="nav-item"><div class="icon-box"><i data-lucide="info"></i></div><span class="nav-text">소개</span></li>
            <li class="nav-item"><div class="icon-box"><i data-lucide="layout-grid"></i></div><span class="nav-text">게시판</span></li>
            <li class="nav-item active"><div class="icon-box"><i data-lucide="image"></i></div><span class="nav-text">갤러리</span></li>
            <li class="nav-item"><div class="icon-box"><i data-lucide="play-square"></i></div><span class="nav-text">쇼츠</span></li>
            <li class="nav-item"><div class="icon-box"><i data-lucide="book-open"></i></div><span class="nav-text">학습</span></li>
            <li class="nav-item"><div class="icon-box"><i data-lucide="trending-up"></i></div><span class="nav-text">외부데이터</span></li>
            <li class="nav-item"><div class="icon-box"><i data-lucide="gamepad-2"></i></div><span class="nav-text">게임</span></li>
        </ul>
        <div class="sidebar-footer"><a href="#" class="login-btn"><div class="icon-box"><i data-lucide="log-in"></i></div><span class="nav-text">로그인</span></a></div>
    </nav>
    <div class="content">사이드바에 마우스를 올려보세요.</div>
    <script>lucide.createIcons();</script>
</body>
</html>
