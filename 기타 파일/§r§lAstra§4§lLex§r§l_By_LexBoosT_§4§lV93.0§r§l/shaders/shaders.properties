uniform.float.onGroundSmooth=smooth(75, if(is_on_ground, 1.0, 0.0), 2.0, 0.9)

####HyperSpeed
#ifdef HYPER_SPEED
variable.float.rawSpeed = sqrt((dx * dx) + (dy * dy) + (dz * dz)) / frameTime
variable.float.smoothSpeed = smooth(63, rawSpeed, 1.0, 1.5)
uniform.float.effectStrength = 1.0 - exp(-smoothSpeed * 0.003906)
uniform.float.sprintingSmooth=smooth(64, if(is_sprinting, 1.0, 0.0), 2.0, 0.9)
#endif

#ifdef UNDERGROUND_SKY
uniform.float.isEyeInCave=if(isEyeInWater == 0, 1.0 - smooth(80, if(eyeAltitude < 5.0, eyeBrightness.y / 240.0, 1.0), 6, 12), 0.0)
#endif

uniform.float.velocity=sqrt(dx * dx + dy * dy + dz * dz)

#BloomStarter

#if (defined COLOR_START || defined BLOOM_START)
variable.float.difSum=abs(dx) + abs(dy) + abs(dz)
variable.float.moving=if(difSum > 0.0 && difSum < 1.0, 1, 0)
variable.float.moved=smooth(40, moving, 0, 31536000)
uniform.float.starter=smooth(41, moved, 100, 100)
#endif

